<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <p class="eyebrow">Lucky Pick</p>
            <button id="theme-toggle" type="button" aria-pressed="false">Dark Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <p class="subtitle">Generate six random numbers and switch between light and dark themes.</p>
        <button id="generate-btn" type="button">Generate Numbers</button>
        <div id="numbers-container" aria-live="polite"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
